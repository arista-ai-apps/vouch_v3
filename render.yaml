services:
  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  - type: web
    name: vouching-backend
    env: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false          # Set manually in Render dashboard
      - key: SECRET_KEY
        sync: false          # Set manually in Render dashboard
      - key: DATABASE_URL
        value: sqlite:///./sql_app.db
      - key: STORAGE_DIR
        value: ./storage

  # ── Frontend (Next.js) ────────────────────────────────────────────────────
  - type: web
    name: vouching-frontend
    env: node
    region: singapore
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_BACKEND_URL
        sync: false          # Set to https://vouching-backend.onrender.com after backend deploys
      - key: PORT
        value: 3000
